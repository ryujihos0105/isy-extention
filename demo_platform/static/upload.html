<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DEMO Studio — 업로드</title>
  <link rel="stylesheet" href="/demo/static/demo.css">
</head>
<body>

  <header class="yt-header">
    <div class="yt-header-left">
      <button class="yt-icon-btn" aria-label="메뉴">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
        </svg>
      </button>
      <a class="yt-logo" href="/demo/browse">
        <svg width="32" height="22" viewBox="0 0 32 22" fill="none" aria-hidden="true">
          <rect width="32" height="22" rx="5" fill="#FF0000"/>
          <path d="M12 6.5L22 11L12 15.5V6.5Z" fill="white"/>
        </svg>
        <span class="yt-logo-text">DEMO Studio</span>
        <span class="yt-logo-isy">
          <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <path d="M12 2 4 6v6c0 5 3.5 8.5 8 10 4.5-1.5 8-5 8-10V6l-8-4z"/>
            <path d="m9 12 2 2 4-4"/>
          </svg>
          ISY 검증
        </span>
      </a>
    </div>

    <div class="yt-header-center">
      <div class="yt-search">
        <input type="search" placeholder="검색" aria-label="검색">
        <button class="yt-search-btn" aria-label="검색 실행">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="yt-header-right">
      <a href="/demo/browse" class="yt-upload-nav-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
        홈으로
      </a>
      <div class="yt-avatar" title="DEMO 계정">D</div>
    </div>
  </header>

  <div class="yt-studio-layout">
    <nav class="yt-studio-sidebar">
      <a class="yt-studio-nav-item active" href="/demo/upload" title="업로드">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
        업로드
      </a>
      <button class="yt-studio-nav-item" data-studio-nav="channel" title="채널 (데모에서는 비활성화)" type="button">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        채널
      </button>
      <button class="yt-studio-nav-item" data-studio-nav="analytics" title="분석 (데모에서는 비활성화)" type="button">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
        분석
      </button>
    </nav>

    <main class="yt-studio-main">
      <h1 class="yt-studio-page-title">동영상 업로드</h1>

      <form id="upload-form">
        <label class="yt-drop-zone" for="video-file">
          <input id="video-file" name="file" type="file" accept="video/*" required>
          <svg class="yt-drop-icon" width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="2" y="6" width="15" height="12" rx="2"/>
            <path d="m17 10 5-3v10l-5-3V10z"/>
          </svg>
          <p class="yt-drop-title">동영상을 끌어다 놓거나 선택하세요</p>
          <p class="yt-drop-sub">파일을 추가하면 자동으로 ISY 검증을 진행하고<br>시청자 공개 라벨을 등록합니다.</p>
          <p id="file-name" class="yt-drop-file"></p>
          <span class="yt-select-btn">파일 선택</span>
        </label>
        <button id="submit-btn" class="yt-reanalyze-btn" type="submit" disabled>분석 다시 실행</button>
      </form>

      <div id="status" class="yt-status">영상 선택 대기 중</div>
      <div id="result-card" class="yt-result-card hidden"></div>
    </main>
  </div>

  <script src="/demo/static/utils.js"></script>
  <script src="/demo/static/upload.js"></script>
</body>
</html>
