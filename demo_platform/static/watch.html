<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DEMO — 시청</title>
  <link rel="stylesheet" href="/demo/static/demo.css">
</head>
<body>

  <header class="yt-header">
    <div class="yt-header-left">
      <button class="yt-icon-btn" aria-label="메뉴">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
        </svg>
      </button>
      <a class="yt-logo" href="/demo/browse">
        <svg width="32" height="22" viewBox="0 0 32 22" fill="none" aria-hidden="true">
          <rect width="32" height="22" rx="5" fill="#FF0000"/>
          <path d="M12 6.5L22 11L12 15.5V6.5Z" fill="white"/>
        </svg>
        <span class="yt-logo-text">DEMO</span>
        <span class="yt-logo-isy">
          <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <path d="M12 2 4 6v6c0 5 3.5 8.5 8 10 4.5-1.5 8-5 8-10V6l-8-4z"/>
            <path d="m9 12 2 2 4-4"/>
          </svg>
          ISY 검증
        </span>
      </a>
    </div>

    <div class="yt-header-center">
      <div class="yt-search">
        <input type="search" placeholder="검색" aria-label="검색">
        <button class="yt-search-btn" aria-label="검색 실행">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="yt-header-right">
      <a href="/demo/upload" class="yt-upload-nav-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
        </svg>
        업로드
      </a>
      <div class="yt-avatar" title="DEMO 계정">D</div>
    </div>
  </header>

  <div class="yt-watch-body">
    <div class="yt-player-col">
      <div class="yt-player-frame">
        <video id="video" controls playsinline></video>
        <div id="player-label" class="yt-player-label">
          <span class="isy-dot"></span>
          <span class="isy-badge-text">ISY 검증</span>
          <span class="isy-divider">·</span>
          <span id="label-text">AI 콘텐츠 안내</span>
        </div>
      </div>

      <div class="yt-video-info">
        <h1 id="video-title" class="yt-video-title">업로드된 영상</h1>
        <hr class="yt-video-divider">
        <div class="yt-channel-row">
          <div class="yt-channel-avatar" id="channel-avatar">D</div>
          <div class="yt-channel-info">
            <div class="yt-channel-name">DEMO Creator</div>
            <div class="yt-channel-subs">구독자 1.2만명</div>
          </div>
          <button class="yt-subscribe-btn">구독</button>
        </div>
        <div class="yt-action-row">
          <button class="yt-action-btn split-left" aria-label="좋아요">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>
            좋아요
          </button>
          <button class="yt-action-btn split-right" aria-label="싫어요">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M15 3H6c-.83 0-1.54.5-1.84 1.22l-3.02 7.05c-.09.23-.14.47-.14.73v2c0 1.1.9 2 2 2h6.31l-.95 4.57-.03.32c0 .41.17.79.44 1.06L9.83 23l6.59-6.59c.36-.36.58-.86.58-1.41V5c0-1.1-.9-2-2-2zm4 0v12h4V3h-4z"/></svg>
          </button>
          <button class="yt-action-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/></svg>
            공유
          </button>
          <button class="yt-action-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
            저장
          </button>
          <button class="yt-action-btn" aria-label="더보기">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
          </button>
        </div>
      </div>
    </div>

    <aside class="yt-related-col">
      <div id="related-videos"></div>
    </aside>
  </div>

  <script src="/demo/static/utils.js"></script>
  <script src="/demo/static/watch.js"></script>
</body>
</html>
