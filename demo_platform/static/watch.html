<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DEMO — 시청자 화면</title>
  <link rel="stylesheet" href="/demo/static/demo.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-brand">
      <span class="brand-name">DEMO</span>
      <span class="isy-verified-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 2 4 6v6c0 5 3.5 8.5 8 10 4.5-1.5 8-5 8-10V6l-8-4z"/>
          <path d="m9 12 2 2 4-4"/>
        </svg>
        ISY 검증
      </span>
    </div>
    <div class="topbar-nav">
      <a class="nav-link" href="/demo/browse">홈</a>
      <a class="nav-link" href="/demo/upload">업로드</a>
    </div>
  </header>

  <main class="watch-shell">
    <section class="player-column">
      <div class="player-frame">
        <video id="video" controls playsinline></video>
        <div id="player-label" class="player-label">
          <span class="label-level-dot"></span>
          <span class="label-verify">ISY 검증</span>
          <span class="label-divider">·</span>
          <span id="label-text">AI 콘텐츠 안내</span>
        </div>
      </div>
      <h1 id="video-title">업로드된 영상</h1>
      <p id="video-channel" class="video-channel">DEMO Creator · 방금 전</p>
    </section>
  </main>

  <script src="/demo/static/watch.js"></script>
</body>
</html>
