<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-text">
        <h1>
          <span class="brand-mark">ISY</span>
          <span class="brand-full">I See You</span>
        </h1>
        <p>AI 생성 가능성을 빠르게 검토합니다.</p>
      </div>
      <div class="brand-logo-stage" aria-hidden="true">
        <img src="../icons/iseeyou.png" alt="" class="brand-logo" width="126" height="84" decoding="async">
      </div>
    </header>

    <section id="adapter-info" class="adapter-info" aria-label="현재 사이트">
      <span class="adapter-label">현재 사이트</span>
      <strong id="adapter-name">감지 중...</strong>
    </section>

    <section id="results-summary" class="results-summary hidden" aria-label="분석 결과 요약">
      <button id="focus-high-btn" class="result-item high-item" type="button" aria-label="AI 가능성 높은 콘텐츠로 이동">
        <span class="result-label">가능성 높음</span>
        <span id="high-count" class="result-count high-count">0</span>
      </button>
      <div class="result-divider"></div>
      <button id="focus-low-btn" class="result-item low-item" type="button" aria-label="AI 가능성 낮은 콘텐츠로 이동">
        <span class="result-label">가능성 낮음</span>
        <span id="low-count" class="result-count low-count">0</span>
      </button>
      <div class="result-divider"></div>
      <button id="focus-failed-btn" class="result-item failed-item" type="button" aria-label="분석 실패 콘텐츠로 이동">
        <span class="result-label">실패</span>
        <span id="failed-count" class="result-count failed-count">0</span>
      </button>
    </section>

    <div id="summary-note" class="summary-note hidden"></div>
    <div id="watching-indicator" class="watching-indicator hidden" aria-hidden="true">
      <span class="watching-dot"></span>
      <span class="watching-text">새로 등장하는 콘텐츠도 계속 확인합니다</span>
    </div>

    <main class="actions">
      <div class="action-group">
        <button id="analyze-all-btn" class="primary" aria-label="페이지의 모든 콘텐츠 분석">
          전체 콘텐츠 분석
        </button>
        <span class="btn-hint">페이지에서 찾은 모든 콘텐츠를 분석</span>
      </div>
      <div class="action-group">
        <button id="analyze-selected-btn" class="secondary" aria-label="선택한 콘텐츠만 분석">
          선택해서 분석
        </button>
        <span class="btn-hint">파란 박스를 계속 클릭해 원하는 항목만 분석</span>
      </div>
      <button id="retry-failed-btn" class="secondary hidden" aria-label="분석 실패 항목 재시도" disabled>
        실패 재시도
      </button>
      <button id="clear-results-btn" class="secondary hidden" aria-label="화면의 분석 라벨 숨기기">
        라벨 숨기기
      </button>
      <button id="stop-analysis-btn" class="secondary hidden" aria-label="자동 분석 중단">
        분석 중단
      </button>
    </main>

    <div id="status" class="status" role="status" aria-live="polite"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
